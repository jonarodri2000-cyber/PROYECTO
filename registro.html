<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro - Universidad de Guayaquil</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to right, #0077b6, #48cae4);
            min-height: 100vh;
        }

        /* NAVBAR */

        nav {
            background: #003366;
            padding: 18px;
            text-align: center;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.2);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffd60a;
        }

        /* CONTENEDOR */

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        .card h1 {
            text-align: center;
            color: #003366;
            margin-bottom: 10px;
            font-size: 35px;
        }

        .card p {
            text-align: center;
            color: gray;
            margin-bottom: 30px;
        }

        /* FORMULARIO */

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input,
        select {
            width: 100%;
            padding: 13px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
        }

        input:focus,
        select:focus {
            border-color: #0077b6;
        }

        /* BOTÓN */

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 30px;
            border: none;
            background: #0077b6;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            background: #023e8a;
        }

        /* LINK */

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            text-decoration: none;
            color: #0077b6;
            font-weight: bold;
        }

        /* FOOTER */

        footer {
            background: #003366;
            color: white;
            text-align: center;
            padding: 18px;
            margin-top: 40px;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav>

        <a href="inicio.html">Inicio</a>

        <a href="login.html">Login</a>

        <a href="registro.html">Registro</a>

    </nav>

    <!-- CONTENIDO -->

    <div class="container">

        <div class="card">

            <h1>Crear Cuenta</h1>

            <p>
                Plataforma de Tutorías Académicas
                - Universidad de Guayaquil
            </p>

            <form>

                <label>Nombre Completo</label>

                <input
                    type="text"
                    id="nombre"
                    placeholder="Ingrese su nombre completo"
                >

                <label>Correo Electrónico</label>

                <input
                    type="email"
                    id="correo"
                    placeholder="Ingrese su correo"
                >

                <label>Contraseña</label>

                <input
                    type="password"
                    id="contrasena"
                    placeholder="Ingrese una contraseña"
                >

                <label>Rol del Usuario</label>

                <select id="rol">

                    <option value="">
                        Seleccione un rol
                    </option>

                    <option value="estudiante">
                        Estudiante
                    </option>

                    <option value="docente">
                        Docente
                    </option>

                    <option value="admin">
                        Administrador
                    </option>

                </select>

                <button
                    type="button"
                    class="btn"
                    onclick="registrar()"
                >

                    Registrarse

                </button>

            </form>

            <div class="login-link">

                <p>

                    ¿Ya tienes cuenta?

                    <a href="login.html">

                        Iniciar Sesión

                    </a>

                </p>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <footer>

        <p>
            © 2025 Universidad de Guayaquil
            - Plataforma de Tutorías Académicas
        </p>

    </footer>

    <!-- SCRIPT -->

    <script>

        function registrar() {

            let nombre =
                document.getElementById("nombre").value;

            let correo =
                document.getElementById("correo").value;

            let contrasena =
                document.getElementById("contrasena").value;

            let rol =
                document.getElementById("rol").value;

            if (
                nombre === "" ||
                correo === "" ||
                contrasena === "" ||
                rol === ""
            ) {

                alert(
                    "Complete todos los campos"
                );

                return;

            }

            let usuario = {

                nombre: nombre,

                correo: correo,

                contrasena: contrasena,

                rol: rol

            };

            localStorage.setItem(
                "usuario",
                JSON.stringify(usuario)
            );

            alert(
                "Usuario registrado correctamente"
            );

            window.location.href =
                "login.html";

        }

    </script>

</body>

</html>
